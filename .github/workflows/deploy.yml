name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE:    ghcr.io/delaguialuzon01/cards

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # nécessaire pour push sur ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # token auto, rien à créer

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest
          build-args: |
            VITE_BASE_URL=${{ secrets.VITE_BASE_URL }}